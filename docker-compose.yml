version: '3.4'

services:
  weaviate:
    command:
      - --host
      - 0.0.0.0
      - --port
      - '8080'
      - --scheme
      - http
    image: cr.weaviate.io/semitechnologies/weaviate:1.31.0
    ports:
      - 8080:8080
      - 50051:50051
    volumes:
      - weaviate_data:/var/lib/weaviate
    restart: on-failure:0
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: 'true'
      PERSISTENCE_DATA_PATH: '/var/lib/weaviate'
      CLUSTER_HOSTNAME: 'node1'
      DISABLE_CLUSTER: 'true'

  weaviate-ui:
    image: naaive/weaviate-ui:latest
    ports:
      - 3000:7777
    environment:
      WUI_WEAVIATE_URL: http://weaviate:8080
      WEAVIATE_URL: http://weaviate:8080 
    depends_on:
      - weaviate

volumes:
  weaviate_data:
